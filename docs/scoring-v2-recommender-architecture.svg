<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">WatchSignal Scoring V2 Architecture</title>
  <desc id="desc">Whole recommender architecture showing profile enrichment, candidate retrieval, concept registry, V2 scoring, shared reconciliation, confidence, explanations, and debug history.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1c252c" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#59636f"/>
    </marker>
    <style>
      .bg { fill: #f7f6f2; }
      .title { font: 700 42px Inter, Arial, sans-serif; fill: #151515; }
      .subtitle { font: 400 20px Inter, Arial, sans-serif; fill: #59636f; }
      .lane { font: 800 16px Inter, Arial, sans-serif; fill: #59636f; letter-spacing: 1px; }
      .box { stroke: #b9c3ce; stroke-width: 2; rx: 10; filter: url(#shadow); }
      .blue { fill: #d9ecff; }
      .green { fill: #ddf4df; }
      .yellow { fill: #fff1c7; }
      .violet { fill: #ebe3ff; }
      .rose { fill: #ffe0e0; }
      .white { fill: #ffffff; }
      .box-title { font: 700 22px Inter, Arial, sans-serif; fill: #151515; }
      .box-text { font: 400 16px Inter, Arial, sans-serif; fill: #4f5a64; }
      .small-title { font: 700 18px Inter, Arial, sans-serif; fill: #151515; }
      .small-text { font: 400 15px Inter, Arial, sans-serif; fill: #4f5a64; }
      .line { stroke: #59636f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .status { font: 700 16px Inter, Arial, sans-serif; fill: #59636f; }
    </style>
  </defs>
  <rect class="bg" width="1400" height="980"/>
  <rect x="70" y="42" width="235" height="34" rx="8" fill="#ffffff" stroke="#b9c3ce"/>
  <text class="status" x="90" y="65">Scoring V2: 14/14 issues done</text>
  <text class="title" x="70" y="130">WatchSignal Scoring V2 Architecture</text>
  <text class="subtitle" x="70" y="168">A whole recommender upgrade: profile enrichment, candidate enrichment, retrieval, ranking, shared reconciliation, confidence, and explanations.</text>
  <text class="subtitle" x="70" y="196">Nudges are one input, not the center of the architecture.</text>

  <text class="lane" x="85" y="265">INPUTS</text>
  <text class="lane" x="420" y="265">CANDIDATE SUPPLY</text>
  <text class="lane" x="735" y="265">ENRICHMENT AND SCORING</text>
  <text class="lane" x="1090" y="265">OUTPUTS</text>

  <rect class="box blue" x="70" y="290" width="285" height="145"/>
  <text class="box-title" x="92" y="326">User Profile Evidence</text>
  <text class="box-text" x="92" y="360">Onboarding seeds</text>
  <text class="box-text" x="92" y="384">Taste Lab ratings</text>
  <text class="box-text" x="92" y="408">Watched history and feedback</text>

  <rect class="box blue" x="70" y="515" width="285" height="145"/>
  <text class="box-title" x="92" y="551">Session Intent</text>
  <text class="box-text" x="92" y="585">Audience and session mode</text>
  <text class="box-text" x="92" y="609">Nudge and person requests</text>
  <text class="box-text" x="92" y="633">Runtime, language, rewatch rules</text>

  <rect class="box green" x="400" y="290" width="285" height="145"/>
  <text class="box-title" x="422" y="326">Watchability Gate</text>
  <text class="box-text" x="422" y="360">Prime Germany access</text>
  <text class="box-text" x="422" y="384">Media type and watched state</text>
  <text class="box-text" x="422" y="408">Safe-pick classification</text>

  <rect class="box green" x="400" y="515" width="285" height="145"/>
  <text class="box-title" x="422" y="551">Candidate Retrieval</text>
  <text class="box-text" x="422" y="585">TMDb discover</text>
  <text class="box-text" x="422" y="609">Person and keyword search</text>
  <text class="box-text" x="422" y="633">Future retrieval adapters</text>

  <rect class="box yellow" x="730" y="290" width="285" height="145"/>
  <text class="box-title" x="752" y="326">Concept Registry</text>
  <text class="box-text" x="752" y="360">Genres, keywords, overview</text>
  <text class="box-text" x="752" y="384">Runtime, cast, local tags</text>
  <text class="box-text" x="752" y="408">Stable taste concepts</text>

  <rect class="box yellow" x="730" y="515" width="285" height="145"/>
  <text class="box-title" x="752" y="551">V2 Scoring Core</text>
  <text class="box-text" x="752" y="585">Per-user fit and dislikes</text>
  <text class="box-text" x="752" y="609">Source reliability and recency</text>
  <text class="box-text" x="752" y="633">Confidence and fallback state</text>

  <rect class="box violet" x="1060" y="290" width="285" height="145"/>
  <text class="box-title" x="1082" y="326">Shared Reconciliation</text>
  <text class="box-text" x="1082" y="360">Husband-first, wife-first</text>
  <text class="box-text" x="1082" y="384">Compromise and veto risk</text>
  <text class="box-text" x="1082" y="408">Overlap and bridge value</text>

  <rect class="box rose" x="1060" y="515" width="285" height="145"/>
  <text class="box-title" x="1082" y="551">Ranked Shortlist</text>
  <text class="box-text" x="1082" y="585">Five picks when available</text>
  <text class="box-text" x="1082" y="609">Dominant reasons and penalties</text>
  <text class="box-text" x="1082" y="633">Debug history and explanation</text>

  <path class="line" d="M355 362 H390"/>
  <path class="line" d="M355 587 H390"/>
  <path class="line" d="M685 362 H720"/>
  <path class="line" d="M685 587 H720"/>
  <path class="line" d="M1015 362 H1050"/>
  <path class="line" d="M1015 587 H1050"/>
  <path class="line" d="M212 435 V505"/>
  <path class="line" d="M542 435 V505"/>
  <path class="line" d="M872 435 V505"/>
  <path class="line" d="M1202 435 V505"/>
  <path class="line" d="M212 660 C212 720, 872 720, 872 670"/>
  <path class="line" d="M542 660 C542 700, 872 700, 872 670"/>

  <rect class="box white" x="70" y="760" width="390" height="120"/>
  <text class="small-title" x="95" y="795">Not Just Nudges</text>
  <text class="small-text" x="95" y="827">Natural-language nudges compile into</text>
  <text class="small-text" x="95" y="849">structured signals, but profile memory and</text>
  <text class="small-text" x="95" y="871">candidate enrichment are equally central.</text>

  <rect class="box white" x="505" y="760" width="390" height="120"/>
  <text class="small-title" x="530" y="795">Profile Enrichment</text>
  <text class="small-text" x="530" y="827">Profiles learn concepts from Taste Lab,</text>
  <text class="small-text" x="530" y="849">history, post-watch feedback, and</text>
  <text class="small-text" x="530" y="871">repeated behavior, not just genres.</text>

  <rect class="box white" x="940" y="760" width="390" height="120"/>
  <text class="small-title" x="965" y="795">Replaceable And Honest</text>
  <text class="small-text" x="965" y="827">V1 stays available, V2 is structured and</text>
  <text class="small-text" x="965" y="849">testable, and weak matches produce</text>
  <text class="small-text" x="965" y="871">confidence or fallback explanations.</text>
</svg>
