name: MVP checks

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  mvp-checks:
    name: MVP checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check public-data hygiene
        run: python3 scripts/check_public_data_hygiene.py

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Bootstrap uv runner
        run: |
          python -m pip install --user uv
          UV_BIN="$(python -c 'import site; print(site.USER_BASE + "/bin/uv")')"
          mkdir -p .tools/uv/bin .tools/uv-cache
          ln -sf "$UV_BIN" .tools/uv/bin/uv
          .tools/uv/bin/uv --version

      - name: Run API checks
        run: pnpm check

      - name: Build web app
        run: pnpm build:web
