name: MVP validation

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  mvp-validation:
    name: MVP validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Bootstrap uv runner
        run: |
          python -m pip install --user uv
          UV_BIN="$(python -c 'import site; print(site.USER_BASE + "/bin/uv")')"
          mkdir -p .tools/uv/bin .tools/uv-cache
          ln -sf "$UV_BIN" .tools/uv/bin/uv
          .tools/uv/bin/uv --version

      - name: Run API checks
        run: pnpm check

      - name: Build web app
        run: pnpm build:web

      - name: Install smoke-test browser
        run: |
          npm_config_cache="$PWD/.tools/npm-cache" npx --yes playwright@1.61.1 install --with-deps chromium
          BROWSER_BIN="$(find "$HOME/.cache/ms-playwright" -path "*/chrome-headless-shell-linux*/chrome-headless-shell" -type f | head -n 1)"
          if [ -z "$BROWSER_BIN" ]; then
            echo "Could not find Playwright Chromium headless-shell binary."
            exit 1
          fi
          mkdir -p .tools
          cat > .tools/chrome-ci-wrapper <<EOF
          #!/usr/bin/env bash
          exec "$BROWSER_BIN" --no-sandbox --disable-dev-shm-usage "\$@"
          EOF
          chmod +x .tools/chrome-ci-wrapper
          echo "MOBILE_UX_SMOKE_BROWSER_BIN=$PWD/.tools/chrome-ci-wrapper" >> "$GITHUB_ENV"

      - name: Run demo mobile UX smoke
        timeout-minutes: 8
        run: pnpm smoke:ux:mobile

      - name: Run backend-backed mobile UX smoke
        timeout-minutes: 8
        run: MOBILE_UX_SMOKE_EXPECT_API=1 pnpm smoke:ux:mobile
